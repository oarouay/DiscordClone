spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-change-me-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  dm-encryption:
    key: ${DM_ENCRYPTION_KEY:change-me-32-bytes-key-change-me}
